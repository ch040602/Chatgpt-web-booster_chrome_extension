<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT Long Chat Loader</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 300px;
      margin: 0;
      padding: 14px;
      font: 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 15px;
      line-height: 1.2;
    }
    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 10px 0;
    }
    label span { flex: 1; }
    input[type="number"] {
      width: 72px;
      padding: 4px 6px;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    .hint {
      margin-top: 12px;
      color: color-mix(in srgb, CanvasText 68%, Canvas 32%);
      font-size: 12px;
    }
    .row {
      border-top: 1px solid color-mix(in srgb, CanvasText 14%, Canvas 86%);
      padding-top: 8px;
    }
    #saved {
      min-height: 16px;
      margin-top: 8px;
      font-size: 12px;
      color: color-mix(in srgb, CanvasText 70%, Canvas 30%);
    }
  </style>
</head>
<body>
  <h1>ChatGPT Long Chat Loader</h1>

  <label>
    <span>확장 기능 사용</span>
    <input id="enabled" type="checkbox">
  </label>

  <label>
    <span>초기 API 응답 줄이기</span>
    <input id="apiTrimEnabled" type="checkbox">
  </label>

  <label>
    <span>상태 배지 표시</span>
    <input id="showStatus" type="checkbox">
  </label>

  <div class="row">
    <label>
      <span>처음 표시할 최근 턴</span>
      <input id="visibleTurns" type="number" min="1" max="100" step="1">
    </label>

    <label>
      <span>더 보기 배치</span>
      <input id="loadMoreBatch" type="number" min="1" max="100" step="1">
    </label>

    <label>
      <span>API 사전 보관 배치</span>
      <input id="prefetchBatches" type="number" min="0" max="30" step="1">
    </label>
  </div>

  <label>
    <span>디버그 로그</span>
    <input id="debug" type="checkbox">
  </label>

  <div class="hint">
    API 응답 줄이기를 끄면 초기 렌더링은 느릴 수 있지만, DOM 숨김만 적용됩니다.
  </div>
  <div id="saved"></div>

  <script src="popup.js"></script>
</body>
</html>
